name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  package:
    uses: tinyland-inc/ci-templates/.github/workflows/js-bazel-package.yml@0d3a9c1fb5198d0670b773e78d9dad6cc5867a98
    with:
      runner_mode: shared
      shared_runner_labels_json: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON }}
      runner_labels_json: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON }}
      workspace_mode: isolated
      publish_mode: same_runner
      node_versions: '["22"]'
      publish_node_version: "22"
      pnpm_version: "10.13.1"
      typecheck_command: pnpm typecheck
      unit_test_command: pnpm test:unit
      build_command: pnpm build
      package_check_command: pnpm check:package
      bazel_targets: "//:pkg //:test"
      package_dir: ./bazel-bin/pkg
      npm_access: public
      github_package_name: "@tummycrypt/tinyland-auth-redis"
      dry_run: true
    secrets: inherit
